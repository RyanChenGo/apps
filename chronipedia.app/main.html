<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronipédia</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #eef2f5;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            color: #1a2a3a;
            line-height: 1.45;
        }

        .chroni-wrapper {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #dce5ec;
            border-right: 1px solid #dce5ec;
        }

        .chroni-header {
            background: #ffffff;
            padding: 1.2rem 2rem 0.8rem 2rem;
            border-bottom: 3px solid #2c6e9e;
        }

        .logo-area h1 {
            font-size: 2rem;
            font-weight: 500;
            color: #1e4668;
            margin-bottom: 0.2rem;
        }

        .logo-area p {
            color: #4a627a;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            border-left: 3px solid #8bb3d0;
            padding-left: 12px;
        }

        .search-section {
            margin: 0.5rem 0;
        }

        #searchInput {
            width: 100%;
            padding: 12px 18px;
            font-size: 1rem;
            border: 1px solid #cbdbe2;
            border-radius: 40px;
            outline: none;
        }

        #searchInput:focus {
            border-color: #2c6e9e;
        }

        .suggest-box {
            margin-top: 8px;
            font-size: 0.9rem;
        }

        .did-you-mean {
            background: #eef3fc;
            padding: 8px 15px;
            border-radius: 30px;
            display: inline-block;
        }

        .did-you-mean a {
            color: #1f6392;
            cursor: pointer;
            text-decoration: underline;
        }

        .chroni-body {
            flex: 1;
            padding: 1.8rem 2rem;
        }

        .dernieres-nouvelles {
            background: #f8fafd;
            border-left: 5px solid #d4451e;
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            border-radius: 14px;
        }

        .dernieres-nouvelles h2 {
            color: #b64926;
            margin-bottom: 10px;
        }

        .news-list {
            list-style: none;
        }

        .news-list li {
            margin-bottom: 10px;
            cursor: pointer;
            color: #1f5882;
        }

        .news-list li:hover {
            text-decoration: underline;
        }

        .article-card {
            border: 1px solid #e2edf2;
            border-radius: 20px;
            padding: 1rem 1.6rem;
            margin-bottom: 1rem;
            cursor: pointer;
            transition: 0.1s;
        }

        .article-card:hover {
            background: #fafeff;
            border-color: #bdd4e4;
        }

        .article-title {
            font-size: 1.3rem;
            font-weight: 600;
            color: #1f5882;
        }

        .article-meta {
            font-size: 0.75rem;
            color: #6c7e94;
            display: flex;
            gap: 20px;
            margin: 8px 0;
        }

        .chroni-footer {
            background: #f8fafc;
            text-align: center;
            padding: 1.2rem;
            font-size: 0.75rem;
            color: #4b6f8c;
            border-top: 1px solid #e2e8f0;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 90%;
            max-width: 900px;
            max-height: 85vh;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .modal-header {
            padding: 1rem 1.5rem;
            background: #f2f6f9;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #dce5ec;
        }

        .close-modal {
            font-size: 28px;
            cursor: pointer;
        }

        .modal-body {
            padding: 1.5rem;
            overflow-y: auto;
        }

        pre {
            background: #f7f9fc;
            padding: 1rem;
            border-left: 4px solid #2c6e9e;
            white-space: pre-wrap;
            font-family: monospace;
        }
    </style>
</head>
<body>
<div class="chroni-wrapper">
    <div class="chroni-header">
        <div class="logo-area">
            <h1>Chronipédia</h1>
            <p>L'encyclopédie des événements, du temps et des articles libres</p>
        </div>
        <div class="search-section">
            <input type="text" id="searchInput" placeholder="Rechercher...">
            <div id="suggestArea" class="suggest-box"></div>
        </div>
    </div>

    <div class="chroni-body">
        <div class="dernieres-nouvelles">
            <h2>📰 Dernières nouvelles</h2>
            <div id="newsList">Chargement...</div>
        </div>
        <div id="articlesList">Chargement...</div>
    </div>

    <div class="chroni-footer">
        ©ChenRyan 2026 Chronipédia Tous droits réservés Reproduction interdite .
    </div>
</div>

<div id="modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Article</h3>
            <span class="close-modal" id="closeModal">&times;</span>
        </div>
        <div class="modal-body">
            <pre id="modalContent"></pre>
            <div id="modalMeta" style="font-size:0.7rem; color:#666; margin-top:1rem;"></div>
        </div>
    </div>
</div>

<script>
    let articles = [];

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function showModal(article) {
        document.getElementById('modalTitle').innerText = article.title;
        document.getElementById('modalContent').innerText = article.fullContent || 'Pas de contenu.';
        document.getElementById('modalMeta').innerHTML = `Créé: ${article.createdDate || '?'} | MAJ: ${article.lastUpdate || '?'} | Auteur: ${article.author || '?'}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function renderLatestNews() {
        const sorted = [...articles].sort((a,b) => new Date(b.lastUpdate || b.createdDate) - new Date(a.lastUpdate || a.createdDate));
        const latest = sorted.slice(0, 5);
        document.getElementById('newsList').innerHTML = '<ul class="news-list">' + latest.map(a => `<li onclick="showModal(articles.find(x=>x.title==='${a.title.replace(/'/g, "\\'")}'))">📄 ${escapeHtml(a.title)} <span style="font-size:0.7rem; color:#888;">(${a.lastUpdate || a.createdDate})</span></li>`).join('') + '</ul>';
    }

    function renderSearchResults(filtered) {
        if (!filtered.length) {
            document.getElementById('articlesList').innerHTML = '<div style="padding:2rem; text-align:center;">Aucun résultat</div>';
            return;
        }
        document.getElementById('articlesList').innerHTML = filtered.map(a => `
            <div class="article-card" onclick="showModal(articles.find(x=>x.title==='${a.title.replace(/'/g, "\\'")}'))">
                <div class="article-title">${escapeHtml(a.title)}</div>
                <div class="article-meta">
                    <span>📅 ${a.createdDate || '?'}</span>
                    <span>🕒 ${a.lastUpdate || '?'}</span>
                    <span>✍️ ${a.author || '?'}</span>
                </div>
                <div>${escapeHtml(a.preview || '')}</div>
            </div>
        `).join('');
    }

    function updateSuggestions(query) {
        const suggestDiv = document.getElementById('suggestArea');
        if (!query.trim()) { suggestDiv.innerHTML = ''; return; }
        const lower = query.toLowerCase();
        const match = articles.find(a => a.title.toLowerCase().includes(lower));
        if (!match) { suggestDiv.innerHTML = ''; return; }
        if (match.title.toLowerCase() === lower) { suggestDiv.innerHTML = ''; return; }
        suggestDiv.innerHTML = `<div class="did-you-mean">🔎 Est-ce que tu veux dire : <a onclick="document.getElementById('searchInput').value='${match.title.replace(/'/g, "\\'")}'; performSearch('${match.title.replace(/'/g, "\\'")}')">${escapeHtml(match.title)}</a> ?</div>`;
    }

    function performSearch(q) {
        const lower = q.trim().toLowerCase();
        if (!lower) return renderSearchResults(articles);
        const filtered = articles.filter(a => a.title.toLowerCase().includes(lower));
        renderSearchResults(filtered);
        updateSuggestions(q);
    }

    fetch('redirect.json')
        .then(res => res.json())
        .then(data => {
            articles = data;
            renderLatestNews();
            renderSearchResults(articles);
        })
        .catch(() => {
            document.getElementById('articlesList').innerHTML = '<div style="color:red;">Error : Please refresh page</div>';
            document.getElementById('newsList').innerHTML = 'Erreur';
        });

    document.getElementById('searchInput').addEventListener('input', (e) => performSearch(e.target.value));
    document.getElementById('closeModal').onclick = () => document.getElementById('modal').style.display = 'none';
    window.onclick = (e) => { if (e.target === document.getElementById('modal')) document.getElementById('modal').style.display = 'none'; };
</script>
</body>
</html>
